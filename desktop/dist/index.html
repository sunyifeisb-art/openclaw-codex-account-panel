<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Codex Account Panel Desktop</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #0a0f1d, #11192b);
      color: #eef3ff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .box {
      max-width: 520px;
      padding: 24px 28px;
      border: 1px solid #24304d;
      border-radius: 18px;
      background: rgba(19, 26, 45, .92);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 8px 0; color: #97a3bf; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="box">
    <h1>正在启动 Codex 面板…</h1>
    <p>桌面 App 正在拉起本地服务并准备加载面板。</p>
    <p>如果几秒后仍未自动进入，请关闭 App 重新打开一次。</p>
  </div>
</body>
</html>
